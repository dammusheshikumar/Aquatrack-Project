version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: aquatrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aquatrack
    ports:
      - "3306:3306"
    volumes:
      - aquatrack-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aquatrack-mysql-data:
