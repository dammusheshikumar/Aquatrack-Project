server:
  port: 8080

spring:
  application:
    name: aquatrack-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:aquatrack}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:aquatrack_user}
    password: ${DB_PASSWORD:aquatrack_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, not Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: ${JWT_SECRET:aquatrack-super-secret-signing-key-please-change-me-in-prod-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  alerts:
    overuse-threshold-multiplier: 1.5   # flag if daily usage > 1.5x household's rolling average
    anomaly-std-dev-multiplier: 2.0     # 2-sigma leak detection rule
  mail:
    from: ${MAIL_FROM:no-reply@aquatrack.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.aquatrack: INFO
